<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #23345d; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 16px; fill: #6b7280; }
      .lane-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #23345d; }
      .box-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #111827; }
      .box-text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 15px; fill: #374151; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13px; fill: #4b5563; }
      .tag { font-family: "Consolas", "Microsoft YaHei", monospace; font-size: 14px; font-weight: 700; fill: #1d4ed8; }
      .lane { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; rx: 22; }
      .frontend { fill: #eef2ff; stroke: #667eea; stroke-width: 2.5; rx: 18; }
      .backend { fill: #ffffff; stroke: #4661a8; stroke-width: 2.5; rx: 18; }
      .service { fill: #f0f9ff; stroke: #38bdf8; stroke-width: 2.2; rx: 16; }
      .prompt { fill: #fff7ed; stroke: #fb923c; stroke-width: 2.2; rx: 16; }
      .llm { fill: #ecfdf5; stroke: #34d399; stroke-width: 2.4; rx: 18; }
      .store { fill: #fef2f2; stroke: #f87171; stroke-width: 2.2; rx: 16; }
      .deploy { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 2.2; rx: 16; }
      .arrow { stroke: #4661a8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #9ca3af; stroke-width: 2.5; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 8 7; }
      .num { fill: #4661a8; }
      .num-text { font-family: Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #ffffff; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4661a8"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1500" height="920" class="bg"/>

  <text x="750" y="52" text-anchor="middle" class="title">程序设计学习智能学伴系统架构图</text>
  <text x="750" y="82" text-anchor="middle" class="subtitle">前端交互 → Flask 后端编排 → 场景识别与 Prompt 构建 → DeepSeek API → 会话保存与前端展示</text>

  <!-- lanes -->
  <rect x="45" y="120" width="300" height="650" class="lane"/>
  <rect x="390" y="120" width="720" height="650" class="lane"/>
  <rect x="1155" y="120" width="300" height="650" class="lane"/>
  <text x="195" y="158" text-anchor="middle" class="lane-title">前端交互层</text>
  <text x="750" y="158" text-anchor="middle" class="lane-title">Flask 后端服务层</text>
  <text x="1305" y="158" text-anchor="middle" class="lane-title">外部服务 / 存储</text>

  <!-- frontend boxes -->
  <rect x="80" y="205" width="230" height="105" class="frontend"/>
  <text x="195" y="238" text-anchor="middle" class="box-title">聊天页面</text>
  <text x="195" y="266" text-anchor="middle" class="box-text">templates/index.html</text>
  <text x="195" y="289" text-anchor="middle" class="box-text">聊天区 / 输入框 / 右侧代码面板</text>

  <rect x="80" y="370" width="230" height="120" class="frontend"/>
  <text x="195" y="402" text-anchor="middle" class="box-title">前端交互逻辑</text>
  <text x="195" y="430" text-anchor="middle" class="box-text">static/js/chat.js</text>
  <text x="195" y="454" text-anchor="middle" class="box-text">fetch 调用 /api/chat</text>
  <text x="195" y="478" text-anchor="middle" class="box-text">超时恢复 / 会话切换</text>

  <rect x="80" y="550" width="230" height="105" class="frontend"/>
  <text x="195" y="582" text-anchor="middle" class="box-title">用户输入</text>
  <text x="195" y="610" text-anchor="middle" class="box-text">message / code / error</text>
  <text x="195" y="633" text-anchor="middle" class="box-text">session_id 保存在 localStorage</text>

  <!-- backend main -->
  <rect x="425" y="205" width="260" height="115" class="backend"/>
  <text x="555" y="238" text-anchor="middle" class="box-title">核心接口</text>
  <text x="555" y="266" text-anchor="middle" class="tag">POST /api/chat</text>
  <text x="555" y="291" text-anchor="middle" class="box-text">app.py 统一编排请求流程</text>

  <rect x="815" y="205" width="260" height="115" class="backend"/>
  <text x="945" y="238" text-anchor="middle" class="box-title">会话接口</text>
  <text x="945" y="266" text-anchor="middle" class="tag">/api/sessions</text>
  <text x="945" y="291" text-anchor="middle" class="box-text">新建 / 查看 / 删除会话</text>

  <!-- services -->
  <rect x="425" y="380" width="205" height="115" class="service"/>
  <text x="528" y="413" text-anchor="middle" class="box-title">意图识别</text>
  <text x="528" y="441" text-anchor="middle" class="box-text">services/classifier.py</text>
  <text x="528" y="466" text-anchor="middle" class="small">error / guidance / knowledge / general</text>

  <rect x="668" y="380" width="205" height="115" class="prompt"/>
  <text x="771" y="413" text-anchor="middle" class="box-title">Prompt 构建</text>
  <text x="771" y="441" text-anchor="middle" class="box-text">prompts/templates.py</text>
  <text x="771" y="466" text-anchor="middle" class="small">人设层 + 场景约束 + 激励指导</text>

  <rect x="910" y="380" width="165" height="115" class="service"/>
  <text x="993" y="413" text-anchor="middle" class="box-title">情绪激励</text>
  <text x="993" y="441" text-anchor="middle" class="box-text">motivation.py</text>
  <text x="993" y="466" text-anchor="middle" class="small">共情 / 表扬 / 鼓励</text>

  <rect x="425" y="555" width="300" height="120" class="service"/>
  <text x="575" y="588" text-anchor="middle" class="box-title">会话管理</text>
  <text x="575" y="616" text-anchor="middle" class="box-text">services/conversation.py</text>
  <text x="575" y="641" text-anchor="middle" class="small">创建 session_id，读取最近历史消息</text>
  <text x="575" y="664" text-anchor="middle" class="small">保存 user / assistant 对话</text>

  <rect x="775" y="555" width="300" height="120" class="service"/>
  <text x="925" y="588" text-anchor="middle" class="box-title">DeepSeek 客户端封装</text>
  <text x="925" y="616" text-anchor="middle" class="box-text">services/llm_client.py</text>
  <text x="925" y="641" text-anchor="middle" class="small">OpenAI 兼容 SDK / 超时配置</text>
  <text x="925" y="664" text-anchor="middle" class="small">按场景设置 temperature 与 max_tokens</text>

  <!-- external -->
  <rect x="1190" y="240" width="230" height="120" class="llm"/>
  <text x="1305" y="274" text-anchor="middle" class="box-title">DeepSeek API</text>
  <text x="1305" y="303" text-anchor="middle" class="box-text">deepseek-chat</text>
  <text x="1305" y="328" text-anchor="middle" class="small">生成错误解释 / 分步引导 / 知识问答</text>

  <rect x="1190" y="435" width="230" height="120" class="store"/>
  <text x="1305" y="468" text-anchor="middle" class="box-title">JSON 会话存储</text>
  <text x="1305" y="496" text-anchor="middle" class="box-text">data/conversations/*.json</text>
  <text x="1305" y="521" text-anchor="middle" class="small">原型阶段轻量持久化</text>

  <rect x="1190" y="625" width="230" height="95" class="deploy"/>
  <text x="1305" y="657" text-anchor="middle" class="box-title">Vercel 部署</text>
  <text x="1305" y="684" text-anchor="middle" class="box-text">api/index.py + vercel.json</text>
  <text x="1305" y="707" text-anchor="middle" class="small">线上预览 / Serverless</text>

  <!-- numbered flow circles -->
  <circle cx="358" cy="430" r="16" class="num"/><text x="358" y="436" text-anchor="middle" class="num-text">1</text>
  <circle cx="555" cy="350" r="16" class="num"/><text x="555" y="356" text-anchor="middle" class="num-text">2</text>
  <circle cx="650" cy="438" r="16" class="num"/><text x="650" y="444" text-anchor="middle" class="num-text">3</text>
  <circle cx="891" cy="438" r="16" class="num"/><text x="891" y="444" text-anchor="middle" class="num-text">4</text>
  <circle cx="1100" cy="615" r="16" class="num"/><text x="1100" y="621" text-anchor="middle" class="num-text">5</text>
  <circle cx="1132" cy="300" r="16" class="num"/><text x="1132" y="306" text-anchor="middle" class="num-text">6</text>
  <circle cx="1132" cy="496" r="16" class="num"/><text x="1132" y="502" text-anchor="middle" class="num-text">7</text>

  <!-- arrows -->
  <path d="M 310 430 L 425 263" class="arrow"/>
  <path d="M 555 320 L 555 380" class="arrow"/>
  <path d="M 630 438 L 668 438" class="arrow"/>
  <path d="M 873 438 L 910 438" class="arrow"/>
  <path d="M 993 495 C 993 525, 956 535, 925 555" class="arrow"/>
  <path d="M 925 555 C 1015 470, 1100 370, 1190 300" class="arrow"/>
  <path d="M 1190 330 C 1120 445, 1050 510, 1000 555" class="arrow-soft"/>
  <path d="M 725 615 L 775 615" class="arrow"/>
  <path d="M 575 675 C 760 760, 1080 680, 1190 520" class="arrow"/>
  <path d="M 1190 480 C 1095 455, 1040 360, 945 320" class="arrow-soft"/>
  <path d="M 815 263 L 685 263" class="arrow-soft"/>
  <path d="M 425 263 C 330 260, 310 350, 310 430" class="arrow-soft"/>

</svg>
