limit_req_zone $binary_remote_addr zone=codemate_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;

    # Replace this before enabling the site.
    server_name xiaomacode.xyz www.xiaomacode.xyz;

    server_tokens off;
    client_max_body_size 2m;

    location /static/ {
        alias /srv/codemate/static/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    location /api/ {
        limit_req zone=codemate_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }
}
