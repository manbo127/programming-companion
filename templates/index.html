<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小码 — 编程学习智能学伴</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ═══ 顶部导航 ═══ -->
    <header class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">🦊</span>
            <span class="nav-title">小码</span>
            <span class="nav-subtitle">编程学伴</span>
        </div>
        <div class="nav-actions">
            <select id="session-selector" class="nav-select">
                <option value="">当前会话</option>
            </select>
            <button id="btn-new-session" class="btn btn-outline">＋ 新对话</button>
            <button id="btn-toggle-panel" class="btn btn-ghost btn-panel-toggle">☰</button>
        </div>
    </header>

    <!-- ═══ 主体 ═══ -->
    <div class="main-container">
        <!-- 左侧：对话 -->
        <main class="chat-panel" id="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-banner">
                    <div class="welcome-mascot">
                        <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- 脸 -->
                            <ellipse cx="48" cy="52" rx="38" ry="34" fill="#E8D5C4"/>
                            <!-- 耳朵 -->
                            <polygon points="18,24 12,4 30,18" fill="#CC785C"/>
                            <polygon points="78,24 84,4 66,18" fill="#CC785C"/>
                            <polygon points="18,24 16,10 28,20" fill="#E8C8B0"/>
                            <polygon points="78,24 80,10 68,20" fill="#E8C8B0"/>
                            <!-- 眼 -->
                            <ellipse cx="36" cy="50" rx="5" ry="5.5" fill="#141413"/>
                            <ellipse cx="60" cy="50" rx="5" ry="5.5" fill="#141413"/>
                            <circle cx="37.5" cy="48" r="1.6" fill="#fff"/>
                            <circle cx="61.5" cy="48" r="1.6" fill="#fff"/>
                            <!-- 鼻 -->
                            <ellipse cx="48" cy="58" rx="4.5" ry="3.5" fill="#3D3D3A"/>
                            <!-- 嘴 -->
                            <path d="M42 64 Q48 69 54 64" stroke="#3D3D3A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">你好，我是小码<span class="welcome-dot">.</span></h1>
                    <p class="welcome-desc">你的编程学习伙伴。不直接给答案，陪你一起想。</p>
                    <div class="welcome-chips">
                        <button class="chip" data-message="我的代码报错了，能帮我看看吗？">
                            <span class="chip-icon">🐛</span>帮我看看报错
                        </button>
                        <button class="chip" data-message="请问怎么判断一个数是不是素数？">
                            <span class="chip-icon">💡</span>解题思路引导
                        </button>
                        <button class="chip" data-message="什么是递归？">
                            <span class="chip-icon">📚</span>解释知识点
                        </button>
                        <button class="chip" data-message="你好！我刚学Python，从哪里开始比较好？">
                            <span class="chip-icon">💬</span>随便聊聊
                        </button>
                    </div>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="chat-input-area">
                <div class="input-row">
                    <textarea id="message-input" class="message-input"
                        placeholder="输入你的问题…" rows="2" autofocus></textarea>
                    <button id="btn-send" class="btn btn-primary btn-send" title="发送">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"/>
                            <polyline points="5 12 12 5 19 12"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
            </div>
        </main>

        <!-- 右侧：工具面板 -->
        <aside class="side-panel" id="side-panel">
            <div class="panel-section">
                <div class="section-header">
                    <span class="panel-label">💬 历史会话</span>
                    <button id="btn-clear-inputs" class="btn btn-ghost btn-sm">清除输入</button>
                </div>
                <div id="history-list" class="history-list">
                    <div class="history-empty">暂无历史会话</div>
                </div>
            </div>

            <div class="panel-divider"></div>

            <div class="panel-section">
                <span class="panel-label">⚡ 快捷场景</span>
                <div class="action-chips">
                    <button class="action-chip" data-mode="error">🐛 代码报错</button>
                    <button class="action-chip" data-mode="guidance">💡 解题求助</button>
                    <button class="action-chip" data-mode="knowledge">📚 知识点</button>
                    <button class="action-chip" data-mode="general">💬 自由对话</button>
                </div>
            </div>

            <div class="panel-divider"></div>

            <div class="panel-section collapsible-section">
                <div class="section-header collapsible-header" id="code-section-toggle">
                    <span class="panel-label">💻 代码 & 错误</span>
                    <span class="collapse-arrow">▾</span>
                </div>
                <div class="collapsible-body" id="code-section-body">
                    <textarea id="code-input" class="code-input"
                        placeholder="粘贴你的代码…" rows="5" spellcheck="false"></textarea>
                    <textarea id="error-input" class="error-input"
                        placeholder="粘贴报错信息…" rows="3" spellcheck="false"></textarea>
                </div>
            </div>
        </aside>
    </div>

    <!-- 面板浮动按钮 -->
    <button id="btn-toggle-float" class="btn-toggle-float" title="展开面板" style="display:none;"
        onclick="document.getElementById('side-panel').classList.remove('collapsed');this.style.display='none';document.getElementById('btn-toggle-panel').textContent='☰';">☰</button>

    <script src="/static/js/chat.js?v=6"></script>
</body>
</html>
